<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" font-family="JetBrains Mono, DejaVu Sans Mono, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#212337"/>
      <stop offset="1" stop-color="#191a2a"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect x="40" y="40" width="1200" height="560" rx="18" fill="none" stroke="#a48cf2" stroke-opacity="0.28" stroke-width="2"/>

  <!-- prompt mark -->
  <text x="86" y="118" font-size="34" font-weight="700" fill="#37f499">&#10095;</text>
  <text x="126" y="118" font-size="30" fill="#767ec7">ritual status</text>

  <!-- wordmark -->
  <text x="640" y="300" font-size="150" font-weight="700" letter-spacing="26" fill="#ebfafa" text-anchor="middle">RITUAL</text>

  <!-- tagline -->
  <text x="640" y="360" font-size="38" font-weight="500" letter-spacing="10" fill="#a48cf2" text-anchor="middle">summon &#183; review &#183; verify</text>

  <!-- subtitle -->
  <text x="640" y="440" font-size="32" fill="#c5cbe6" text-anchor="middle">A multi-LLM coding-workflow TUI</text>
  <text x="640" y="482" font-size="25" fill="#767ec7" text-anchor="middle">Claude Code implements &#183; Codex reviews &#183; grounded in ./check.sh</text>

  <!-- chips -->
  <text x="640" y="558" font-size="25" letter-spacing="1" fill="#565f89" text-anchor="middle" xml:space="preserve"><tspan fill="#37f499">Rust 2024</tspan>   &#183;   <tspan fill="#04d1f9">ratatui</tspan>   &#183;   <tspan fill="#f7c67f">zero-token CI</tspan>   &#183;   <tspan fill="#a48cf2">MIT / Apache-2.0</tspan></text>
</svg>
