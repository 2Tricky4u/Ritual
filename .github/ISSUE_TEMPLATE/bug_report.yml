name: Bug report
description: Something in ritual misbehaves
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. The two fields marked required (`ritual doctor`
        output and version) resolve most issues on their own — please include them.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you do, and what went wrong?
      placeholder: I pressed F on a queued finding and the apply modal never opened.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact sequence, ideally from a fresh `ritual` launch.
      placeholder: |
        1. cd into a project with .ritual/
        2. ritual → tab 2 (findings)
        3. F on a confirmed plan finding
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: "`ritual doctor` output"
      description: Paste the full output. It surfaces most environment/config problems.
      render: text
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `ritual --version`.
      placeholder: ritual 0.9.0
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: OS + terminal
      placeholder: Arch Linux, kitty 0.42 (or macOS, Windows Terminal, …)
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant run archive (optional)
      description: >
        If a stage failed, the tail of the matching `.ritual/runs/*.jsonl` /
        `*.meta.json` helps. Redaction is on by default, but review before pasting.
      render: text
    validations:
      required: false
