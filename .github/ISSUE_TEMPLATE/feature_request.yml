name: Feature request
description: Suggest an improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ritual is a focused solo-power-user TUI - see the [Roadmap](../../blob/main/ROADMAP.md)
        for the non-goals before proposing large additions.
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you trying to do that ritual makes hard today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: textarea
    id: fit
    attributes:
      label: Workflow fit
      description: >
        How does this fit the plan → review → tdd → implement → dual-review loop
        the tool is built around?
    validations:
      required: false
